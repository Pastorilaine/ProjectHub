name: Release

# Triggers when a version tag like v1.2.3 is pushed.
# The developer runs: git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # Required to create GitHub Releases and upload assets

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        # postinstall runs electron-builder install-app-deps,
        # which downloads prebuilt better-sqlite3 for the target Electron version.
        run: npm ci

      - name: Build Vite bundles
        run: npm run build

      - name: Package & publish to GitHub Releases
        run: npx electron-builder --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
